# 此倉庫根目錄即遊戲（RPG Maker MZ 網頁匯出）；artifact 為整個 repo 根目錄。
# 使用：GitHub → Settings → Pages → Source 選 GitHub Actions。

name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write admin override config from Secrets (optional)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ADMIN_AUTH_EMAIL: ${{ secrets.ADMIN_AUTH_EMAIL }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          STUDENT_EMAIL_DOMAIN: ${{ secrets.STUDENT_EMAIL_DOMAIN }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ] && [ -n "$ADMIN_AUTH_EMAIL" ]; then
            node tools/write_school_auth_config.mjs
            echo "已寫入 js/school-auth-config.defaults.js（管理員覆寫）"
          else
            echo "::notice::未設定完整 Secrets，略過 defaults.js（學生仍可用 js/school-auth-config.js 登入）"
            rm -f js/school-auth-config.defaults.js
          fi
          test -f js/school-auth-config.js || (echo "缺少 js/school-auth-config.js" && exit 1)

      - name: Upload Pages artifact（倉庫根 = 遊戲根）
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

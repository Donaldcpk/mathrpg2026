<!DOCTYPE html>
<html>
    <head>
        <!-- GitHub Pages 等於路徑掛載時，讓 js/、data/、img/ 相對網址指向正確前綴 -->
        <script>
            (function () {
                var path = location.pathname;
                if (!path.endsWith('/')) {
                    path = path.replace(/\/[^/]+$/, '/');
                }
                if (!path.endsWith('/')) path += '/';
                var b = document.createElement('base');
                b.href = path;
                document.head.insertBefore(b, document.head.firstChild);
            })();
        </script>
        <meta charset="UTF-8">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="viewport" content="user-scalable=no">
        <link rel="icon" href="icon/icon.png" type="image/png">
        <link rel="apple-touch-icon" href="icon/icon.png">
        <link rel="stylesheet" type="text/css" href="css/game.css">
        <title>MATH-RPG-2026</title>
    </head>
    <body style="background-color: black">
        <!-- 學校登入通過後才由 school-auth-gate 載入 js/main.js -->
        <script type="text/javascript" src="js/school-auth-config.defaults.js"></script>
        <script type="text/javascript" src="js/school-auth-gate.js"></script>
    </body>
</html>

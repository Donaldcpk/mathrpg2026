<!DOCTYPE html>
<html lang="zh-Hant">
    <head>
        <meta charset="UTF-8">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="viewport" content="user-scalable=no">
        <meta name="mobile-web-app-capable" content="yes">
        <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; connect-src * https: wss:; img-src * data: blob:;">
        <meta name="description" content="TSA Training：請以校方派發之學校電郵登入，密碼為出生年月日（8 碼）。">
        <link rel="icon" href="icon/icon.png" type="image/png">
        <link rel="apple-touch-icon" href="icon/icon.png">
        <link rel="stylesheet" type="text/css" href="css/game.css">
        <title>潛行數界傳奇</title>
    </head>
    <body style="background-color: black">
        <!-- config.js 必載入；defaults.js 僅本機 localhost 才載入（避免 GitHub 404 紅字） -->
        <script type="text/javascript" src="js/school-auth-config.js?v=20260524"></script>
        <script type="text/javascript">
        (function () {
            var h = location.hostname;
            if (h !== 'localhost' && h !== '127.0.0.1') return;
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'js/school-auth-config.defaults.js', false);
            try {
                xhr.send();
                if (xhr.status === 200) {
                    eval(xhr.responseText);
                }
            } catch (e) {
                /* 本機無 defaults 時略過 */
            }
        })();
        </script>
        <script type="text/javascript" src="js/school-auth-gate.js?v=20260524"></script>
    </body>
</html>
